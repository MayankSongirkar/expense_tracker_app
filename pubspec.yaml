name: expense_tracker
description: "Smart Expense Tracker - A production-ready expense management app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # Dependency Injection
  get_it: ^7.7.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  csv: ^6.0.0
  equatable: ^2.0.5
  http: ^1.1.0
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.1.0
  
  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  
  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  
  assets:
    - .env